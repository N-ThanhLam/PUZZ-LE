<script>
// Preserve the largest viewport across same-tab mode navigations. Mobile browser
// bars often reappear during a URL change; treating that temporary size as the
// new baseline makes every destination screen visibly shrink.
(function(){
  const query=new URLSearchParams(location.search), display=window.screen||{}, shortSide=Math.min(Number(display.width)||innerWidth,Number(display.height)||innerHeight);
  const forcedPhone=query.get('phone')==='1', phone=forcedPhone||(query.get('desktop')!=='1'&&matchMedia('(pointer: coarse)').matches&&shortSide<=720);
  document.documentElement.dataset.phoneUi=phone?'1':'0';
  if(phone) {
    const phoneShort=forcedPhone?Math.min(innerWidth,innerHeight):shortSide, longSide=forcedPhone?Math.max(innerWidth,innerHeight):Math.max(Number(display.width)||innerWidth,Number(display.height)||innerHeight);
    const measuredPhoneCanvasH=Math.max(1600,Math.min(2000,Math.round(900*longSide/Math.max(1,phoneShort))));
    const canvasKey=`puzzle-le-phone-canvas-v1:${Math.round(Number(display.width)||0)}x${Math.round(Number(display.height)||0)}@${Math.round((devicePixelRatio||1)*100)}`;
    let storedPhoneCanvasH=0;
    try { storedPhoneCanvasH=Number(sessionStorage.getItem(canvasKey))||0; } catch(_) {}
    const phoneCanvasH=storedPhoneCanvasH>=1600&&storedPhoneCanvasH<=2000?storedPhoneCanvasH:measuredPhoneCanvasH;
    try { sessionStorage.setItem(canvasKey,String(phoneCanvasH)); } catch(_) {}
    document.documentElement.dataset.phoneCanvasH=String(phoneCanvasH);
    document.documentElement.style.setProperty('--phone-aspect',String(900/phoneCanvasH));
  }
  let portraitNavigationPending=false;
  const lockPortrait=()=>{
    if(!phone) return Promise.resolve();
    try { return Promise.resolve(window.screen?.orientation?.lock?.('portrait')).catch(()=>{}); }
    catch(_) { return Promise.resolve(); }
  };
  const navigationTarget=value=>{
    const target=new URL(String(value),location.href);
    if(target.origin===location.origin&&forcedPhone&&!target.searchParams.has('phone')) target.searchParams.set('phone','1');
    if(target.origin===location.origin&&query.get('desktop')==='1'&&!target.searchParams.has('desktop')) target.searchParams.set('desktop','1');
    return target.href;
  };
  const commitNavigation=(value,replace=false)=>{
    const target=navigationTarget(value);
    if(!phone) { if(replace) location.replace(target); else location.assign(target); return; }
    if(portraitNavigationPending) return;
    portraitNavigationPending=true;
    document.documentElement.dataset.phoneNavigating='1';
    const commit=()=>{ if(replace) location.replace(target); else location.assign(target); };
    Promise.race([lockPortrait(),new Promise(resolve=>setTimeout(resolve,70))]).finally(commit);
  };
  const reloadPortrait=()=>{
    if(!phone) { location.reload(); return; }
    if(portraitNavigationPending) return;
    portraitNavigationPending=true;
    document.documentElement.dataset.phoneNavigating='1';
    Promise.race([lockPortrait(),new Promise(resolve=>setTimeout(resolve,70))]).finally(()=>location.reload());
  };
  window.PUZZLE_PHONE_PORTRAIT=Object.freeze({phone,lock:lockPortrait,navigate:commitNavigation,reload:reloadPortrait});
  if(phone) lockPortrait();
  const state={kind:'',width:0,height:0,key:''};
  const namePrefix='puzzle-le-viewport:';
  const storageKey=kind=>{
    const display=window.screen||{},sw=Math.round(display.width||0),sh=Math.round(display.height||0),scale=Math.round((window.devicePixelRatio||1)*100);
    return `puzzle-le-stable-viewport-v2:${kind}:${sw}x${sh}@${scale}`;
  };
  const read=key=>{
    try {
      const saved=JSON.parse(window.sessionStorage?.getItem(key)||'null');
      if(Number.isFinite(saved?.width)&&Number.isFinite(saved?.height)&&saved.width>=240&&saved.height>=240) return saved;
    } catch(_) {}
    try {
      const saved=window.name.startsWith(namePrefix)?JSON.parse(window.name.slice(namePrefix.length)):null;
      return saved?.key===key&&Number.isFinite(saved.width)&&Number.isFinite(saved.height)&&saved.width>=240&&saved.height>=240?saved:null;
    } catch(_) { return null; }
  };
  const write=()=>{
    const saved={key:state.key,width:state.width,height:state.height};
    try { window.sessionStorage?.setItem(state.key,JSON.stringify(saved)); } catch(_) {}
    try { if(!window.name||window.name.startsWith(namePrefix)) window.name=namePrefix+JSON.stringify(saved); } catch(_) {}
  };
  function apply(){
    const viewport=window.visualViewport,width=Math.round(viewport?.width||window.innerWidth),height=Math.round(viewport?.height||window.innerHeight),kind=phone?'phone':width>=height?'landscape':'portrait',key=storageKey(kind);
    if(kind!==state.kind||key!==state.key) {
      const saved=read(key); state.kind=kind; state.key=key; state.width=Math.max(width,saved?.width||0); state.height=Math.max(height,saved?.height||0);
    } else {
      state.width=Math.max(state.width,width); state.height=Math.max(state.height,height);
    }
    write();
    document.documentElement.style.setProperty('--app-w',`${state.width}px`);
    document.documentElement.style.setProperty('--app-h',`${state.height}px`);
    return {...state};
  }
  window.PUZZLE_APP_VIEWPORT=Object.freeze({apply,state});
  apply();
})();
</script>

      else if(['cancel','pause'].includes(name)) soundEvent('uiCancel');

    if(name==='share') { if(phase==='communityBrowse') cycleCommunitySort(1); else if(phase==='onlineLobby') p2pCopyInvite(); else if(phase==='puzzleEditor') shareEditorPuzzle(); else if(phase==='creatorLibrary') { const puzzle=readCustomPuzzles()[creatorLibraryIndex]; if(puzzle) shareCustomPuzzle(puzzle); } else if(phase==='creatorCourseSelect') shareCreatorCourse(); else shareReplay(); return; }

    if(name==='hint' && phase==='puzzleFailed' && COMMUNITY_PUZZLE_ID) { say('解答はクリア後に見られます',1800); return; }
    if(name==='hint' && phase==='puzzleFailed' && ACTIVE_PUZZLE?.id.startsWith('custom_') && customPuzzleHasSolution(ACTIVE_PUZZLE)) { launchCustomSolution(); return; }
    if(name==='hint' && phase!=='puzzleEditor') { showPuzzleHint(); return; }
    if(name==='help') { if(phase==='puzzleEditor') { editorGoalIndex=(editorGoalIndex+1)%EDITOR_GOALS.length; return; } toggleHelp(); return; }

      if(name==='right'||name==='down'||name==='rotateRight') { titleMenuIndex=(titleMenuIndex+1)%choices.length; return; }
      if(['confirm','start'].includes(name)) {
        const chosen=choices[titleMenuIndex];

        if(chosen==='rogue') { if(PLAY_MODE==='rogue') beginRogueRun(); else navigateApp(`${location.pathname}?mode=rogue`); return; }

    const deterministic=runDeterminismSuite(); resetGame(); const core=runCoreRuleSuite(); resetGame(); const cardMatrix=runBuildCardMatrixSuite(); resetGame(); const buildBalance=runBuildBalanceSuite(); resetGame(); const rogueBalance=runRogueBalanceSuite(); resetGame(); const movement=runMovementRuleSuite(); resetGame(); const terrain=runTerrainRuleSuite(); resetGame(); const timing=runTimingRuleSuite(); resetGame(); const gamepad=runGamepadRuleSuite(); resetGame(); const replayCodec=runReplayCodecSuite(); resetGame(); const terrainDensity=runTerrainDensitySuite();

    document.documentElement.dataset.rogueOutcome=JSON.stringify({seeds:rogueBalance.outcome.seeds,runs:rogueBalance.outcome.runs,profiles:rogueBalance.outcome.profiles,strategies:rogueBalance.outcome.strategies,mutators:rogueBalance.outcome.mutators,contracts:rogueBalance.outcome.contracts,worstCells:rogueBalance.outcome.cells.slice(0,8),cards:rogueBalance.outcome.cards,topBuilds:rogueBalance.outcome.builds.slice(0,8),bottomBuilds:rogueBalance.outcome.builds.slice(-8)});

    document.documentElement.dataset.buildBalance=`${buildBalance.report.seeds} seeds / avg survival ${buildBalance.report.averageSurvival.toFixed(1)} / top pick ${balanceLead.id} ${(balanceLead.pickRate*100).toFixed(1)}% / top pair ${balancePair.key} ${balancePair.survivalTurns.toFixed(1)}`;
    console.info('PUZZ-LE selftest',{deterministic,core,cardMatrix,buildBalance,rogueBalance,movement,terrain,timing,gamepad,replayCodec,terrainDensity});
  }
  if(QUERY.has('replay')) document.documentElement.dataset.replayImport=IMPORTED_REPLAY ? `accepted-v${IMPORTED_REPLAY.version}-from-v${IMPORTED_REPLAY.migratedFrom}` : `rejected-${REPLAY_IMPORT_ERROR}`;
  if(QUERY.get('touch') === '1') document.documentElement.dataset.touchTest=touchControlsVisible() ? 'controls-enabled' : 'controls-hidden';
  if(GAMEPAD_TEST) document.documentElement.dataset.gamepadTest=gamepadPresent() && !touchControlsVisible() ? 'gamepad-ui-enabled' : 'gamepad-ui-failed';
  if(PHONE_UI) lockAppOrientation();
  resetGame();
  if(COMMUNITY_REQUESTED) openCommunityBrowser();
  else if(CREATOR_LIBRARY_REQUESTED) phase='creatorLibrary';
  else if(P2P_MATCH_ENABLED) p2pStartMatchTransport();
  else if(ONLINE_SPECTATOR_ENABLED) { phase='onlineSpectator'; connectOnline(ONLINE_ROOM_FROM_LINK); }
  else if(ONLINE_MATCH_ENABLED) { phase='onlineMatchWait'; connectOnline(ONLINE_ROOM_FROM_LINK); }
  else if(!IMPORTED_REPLAY&&COMMUNITY_DAILY_DATE&&DEV_SCENARIO==='community-daily-result-mid') loadDevCommunityDailyResult(false);
  else if(!IMPORTED_REPLAY&&COMMUNITY_DAILY_DATE&&DEV_SCENARIO==='community-daily-result-complete') loadDevCommunityDailyResult(true);
  else if(!IMPORTED_REPLAY&&COMMUNITY_PUZZLE_ID&&DEV_SCENARIO==='community-result-clear') { phase='puzzleComplete'; active=null; turn=Math.min(ACTIVE_PUZZLE.turnLimit,Math.max(1,ACTIVE_PUZZLE.analysis?.turns||1)); puzzleClearResult={stars:3,improved:true,bestTurn:turn}; }
  else if(!IMPORTED_REPLAY&&COMMUNITY_PUZZLE_ID&&DEV_SCENARIO==='community-result-fail') { phase='puzzleFailed'; active=null; turn=ACTIVE_PUZZLE.turnLimit; }
  else if(!IMPORTED_REPLAY&&DEV_SCENARIO==='build-report') loadDevBuildReport();
  else if(!IMPORTED_REPLAY&&PLAY_MODE==='rogue'&&DEV_SCENARIO==='rogue-reward') loadDevRogueReward();
  else if(!IMPORTED_REPLAY&&PLAY_MODE==='rogue'&&DEV_SCENARIO==='rogue-rest-upgrade') loadDevRogueRestUpgrade();
  else if(!IMPORTED_REPLAY&&PLAY_MODE==='rogue'&&DEV_SCENARIO==='rogue-result-win') loadDevRogueResult(true);
  else if(!IMPORTED_REPLAY&&PLAY_MODE==='rogue'&&DEV_SCENARIO==='rogue-result-loss') loadDevRogueResult(false);
  else if(!IMPORTED_REPLAY&&PLAY_MODE==='rogue'&&DEV_SCENARIO==='rogue-result-perfect') loadDevRoguePerfectResult();
  else if(!IMPORTED_REPLAY&&PLAY_MODE==='build') beginDraft();
  else if(!IMPORTED_REPLAY&&PLAY_MODE==='rogue'&&QUERY.get('resume')==='1'&&rogueCheckpoint()) resumeRogueRun();
  else if(!IMPORTED_REPLAY&&PLAY_MODE==='rogue') beginRogueRun();
  else if(!IMPORTED_REPLAY&&PLAY_MODE==='ranked'&&QUERY.has('mode')) { phase='falling'; toast=''; toastUntil=0; gravityAt=performance.now()+gravityInterval(); }
  else if(!IMPORTED_REPLAY&&PLAY_MODE==='puzzle'&&QUERY.has('puzzle')) { phase='falling'; toast=''; toastUntil=0; gravityAt=performance.now()+gravityInterval(); }
  else if(!IMPORTED_REPLAY&&PLAY_MODE==='daily'&&QUERY.has('date')) { phase='falling'; toast=''; toastUntil=0; gravityAt=performance.now()+gravityInterval(); }
  else if(!IMPORTED_REPLAY&&['terrain','attribute','pvp'].includes(PLAY_MODE)&&QUERY.has('mode')) { phase='falling'; toast=''; toastUntil=0; gravityAt=performance.now()+gravityInterval(); }
  if(!P2P_HEADLESS) requestAnimationFrame(loop);
})();

<script>
(function(){

      // and away from the touch controls. Desktop retains the wide header chip.
      el.style.cssText=document.documentElement.dataset.phoneUi==='1'
        ?'position:fixed;right:max(env(safe-area-inset-right),6px);top:max(env(safe-area-inset-top),6px);z-index:100000;max-width:min(48vw,210px);padding:6px 9px;border:1px solid #79d8ff;border-radius:10px;background:rgba(13,33,48,.94);color:#effbff;text-align:center;font:800 14px/1.3 "Yu Gothic UI","Meiryo",sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.45)'
        :'position:fixed;left:50%;top:14px;z-index:100000;transform:translateX(-50%);max-width:min(92vw,680px);padding:10px 20px;border:2px solid #79d8ff;border-radius:14px;background:#0d2130;color:#effbff;text-align:center;font:800 22px/1.35 "Yu Gothic UI","Meiryo",sans-serif;box-shadow:0 14px 44px rgba(0,0,0,.5)';
      document.body.appendChild(el);
    }
    el.textContent=document.documentElement.dataset.phoneUi==='1'&&message.startsWith('更新があります')?'更新あり。タイトルで反映':message;
  }
  function atSafeReloadPoint(){ return document.documentElement.dataset.appPhase==='title'; }

    const reg=updateRegistration||await navigator.serviceWorker.ready.catch(()=>null), worker=reg?.active||navigator.serviceWorker.controller;

  async function reloadWhenSafe(){

    reloadStarted=true; sessionStorage.removeItem(PENDING_KEY); notice('最新版へ更新しています…');
    await refreshOfflineShell();
    // A mode/puzzle URL rebuilds that board on load. Finish an update at the
    // clean title URL, and replace history so Back cannot reopen the old board.
    setTimeout(()=>{
      if(location.search||location.hash) window.PUZZLE_PHONE_PORTRAIT.navigate(location.pathname,true);
      else window.PUZZLE_PHONE_PORTRAIT.reload();

  }
  function applyPendingReload(){ if(sessionStorage.getItem(PENDING_KEY)==='1'&&atSafeReloadPoint()) reloadWhenSafe(); }
  async function signature(text){
    if(crypto?.subtle){ const hash=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text)); return Array.from(new Uint8Array(hash),v=>v.toString(16).padStart(2,'0')).join(''); }

  }

      localStorage.setItem(SIGNATURE_KEY,next);

  document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'){ checkForUpdate(); applyPendingReload(); } });
